name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            perl \
            unzip \
            zip \
            libgl1-mesa-dev

      - name: Install Qt 5.14.2
        uses: jurplel/install-qt-action@v4
        with:
          version: 5.14.2
          host: linux
          target: desktop
          arch: gcc_64
          modules: qtbase
          cache: true

      - name: Configure CMake
        run: cmake -S . -B build -DAVERRA_BUILD_EXAMPLES=ON -DAVERRA_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build -j16

      - name: Run tests
        run: ctest --test-dir build --output-on-failure
